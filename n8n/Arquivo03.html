<!-- Arquivo03.html — Monitoramento de Inatividade, Envio de Formulário e Perguntas -->
<script>
  // ⏱ Monitoramento de inatividade 
  let inatividadeTimer;
  let sessaoAtiva = false;

  function resetarTimer() {
    if (!sessaoAtiva) return; 
    clearTimeout(inatividadeTimer);
    inatividadeTimer = setTimeout(() => {
      deslogar();
      const msg = document.getElementById('mensagem-chave');
      msg.textContent = "⏱ Sessão expirada por inatividade. Por favor, insira a chave novamente.";
      msg.style.color = "orange";
    }, 10 * 60 * 1000);
  }

  function iniciarMonitoramentoInatividade() {
    ['mousemove', 'keydown', 'scroll', 'click'].forEach(evt =>
      document.addEventListener(evt, resetarTimer)
    );
  }
  iniciarMonitoramentoInatividade();

  // 📤 Função de envio do formulário
  async function enviarFormulario(event) {
    console.log('▶️ enviarFormulario foi acionado');
    event.preventDefault();

    sessaoAtiva = true; // ativa sessão após primeiro envio
    resetarTimer();

    const spinner = document.getElementById('spinner');
    spinner.style.display = 'inline-block';

    const form = document.getElementById('formulario');
    const formData = new FormData(form);
    formData.delete('senha');
    const prompt = document.getElementById('prompt').value.trim();
    formData.set('prompt', prompt);

    const containerAnalise = document.getElementById('analise');
    document.getElementById('carregando-analise')?.remove();

    const carregando = document.createElement('div');
    carregando.id = 'carregando-analise';
    carregando.textContent = 'Processando...';
    carregando.style.marginBottom = '12px';
    containerAnalise.prepend(carregando);

    try {
      const resposta = await fetch(
        'https://educacaopelotrabalho-production.up.railway.app/analise',
        { method: 'POST', body: formData }
      );
      const respostaTexto = await resposta.text();
      console.log('⛔️ Response raw text:', respostaTexto);

      let json;
      try {
        json = JSON.parse(respostaTexto);
      } catch {
        throw new Error('Não foi possível parsear resposta JSON: ' + respostaTexto);
      }

      if (json.analise && json.analise.trim()) {
        document.getElementById('carregando-analise')?.remove();

        const parteAnalise = json.analise
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br>');

        containerAnalise.insertAdjacentHTML(
          'afterbegin',
          `
          <div class="analise-completa"
               style="margin-bottom:24px; padding-bottom:12px; border-bottom:1px solid #ccc;">
            <div class="analise-texto">${parteAnalise}</div>
            ${json.grafico_base64
              ? `<div class="analise-graficos">
                   <img src="data:image/png;base64,${json.grafico_base64}"
                        alt="Gráfico da análise"
                        style="margin-top:12px; border-radius:6px; max-width:100%;" />
                 </div>`
              : ''}
          </div>
        `);

        const botaoPerguntar = document.getElementById('botao-perguntar');
        botaoPerguntar.style.display = 'inline-block';
        botaoPerguntar.disabled = false;
        botaoPerguntar.onclick = perguntarIA; // ✅ agora o botão dispara a função corretamente
      }
    } catch (error) {
      containerAnalise.insertAdjacentHTML(
        'afterbegin',
        `<div style="color:red; margin-bottom:12px;">❌ Erro: ${error.message}</div>`
      );
    } finally {
      spinner.style.display = 'none';
    }
  }

// 🧠 Função de pergunta ao Agente baseado na última análise
async function perguntarIA() {
  alert('▶️ perguntarIA foi acionado');

  const promptInput = document.getElementById('prompt');
  const pergunta = promptInput.value.trim();
  if (!pergunta) return;

  const ultima = document.querySelector('.analise-completa .analise-texto');
  if (!ultima) {
    alert('⚠️ Nenhuma análise encontrada.');
    return;
  }

  const textoPlano = ultima.textContent.trim();

  const payload = {
    analise: textoPlano,
    prompt: pergunta
  };

  const blocoPergunta = document.createElement('div');
  blocoPergunta.className = 'pergunta-resposta';
  blocoPergunta.style.marginBottom = '24px';
  blocoPergunta.style.border = '1px solid #007bff';
  blocoPergunta.style.padding = '12px';
  blocoPergunta.innerHTML = `<strong>Pergunta:</strong> ${pergunta}<br><em>Carregando...</em>`;
  document.getElementById('analise').prepend(blocoPergunta);

  try {
    const response = await fetch(
      'https://primary-production-1d53.up.railway.app/webhook/perguntar-ia',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }
    );

    const data = await response.json();
    console.log("🟡 Resposta bruta recebida do agente:", data);

    let respostaFinal = "";

    if (typeof data === "string") {
      respostaFinal = data;
    } else if (data?.analise && typeof data.analise === "string") {
      respostaFinal = data.analise;
    } else {
      respostaFinal = JSON.stringify(data);
    }

    if (typeof respostaFinal === "string") {
      respostaFinal = respostaFinal
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/\n/g, "<br>");
    } else {
      respostaFinal = "❌ Nenhuma resposta válida recebida.";
    }

    blocoPergunta.innerHTML = `<strong>Pergunta:</strong> ${pergunta}<br><strong>Resposta:</strong> ${respostaFinal}`;
  } catch (e) {
    console.error("❌ Erro no fetch ou no processamento:", e);
    blocoPergunta.innerHTML = `<span style="color:red;">❌ Erro: ${e.message}</span>`;
  }
}

</script>
